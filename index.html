<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0404 업데이트)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        /* 1. 마인크래프트 스타일 한글 픽셀 폰트 (네오둥근모) 불러오기 */
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            margin: 0; padding: 0; background-color: #1a1a1a; 
            font-family: 'NeoDunggeunmo', sans-serif; /* 사이트 전체에 픽셀 폰트 적용 */
        }
        
        /* 지도가 화면 전체를 채우도록 설정 */
        #map { width: 100vw; height: 100vh; }
        
        /* 2. 말풍선(Popup)을 마인크래프트 UI 스타일로 변경 */
        .leaflet-popup-content-wrapper {
            background-color: rgba(40, 40, 40, 0.9); /* 반투명 어두운 회색 (마크 배경 느낌) */
            border: 3px solid #777; /* 회색 테두리 */
            border-radius: 0; /* 둥근 모서리 없애고 네모 반듯하게 */
            color: #ffffff; /* 글자색 흰색 */
        }
        
        /* 말풍선 아래쪽 뾰족한 꼬리 부분 색상 맞춤 */
        .leaflet-popup-tip {
            background-color: rgba(40, 40, 40, 0.9);
            border: 3px solid #777;
            border-top: none;
            border-left: none;
        }

        /* 말풍선 안의 글씨 설정 */
        .leaflet-popup-content {
            font-family: 'NeoDunggeunmo', sans-serif;
            font-size: 18px; /* 글씨 크기 키움 */
            text-align: center;
            margin: 8px 15px;
        }

        /* 닫기(X) 버튼 흰색으로 변경 */
        .leaflet-popup-close-button {
            color: #ffffff !important;
        }
    </style>
</head>
<body>

    <div id="images/map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
 <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>
</body>
</html>
